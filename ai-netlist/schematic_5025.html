<script>
const cv = document.getElementById('sch');
const g  = cv.getContext('2d');
const W  = 1800, H = 1260;

// ─── Palette ──────────────────────────────────────────────────────────────────
const C = {
  bg:'#0d1117',   grid:'#161b22',
  dig:'#0d2237',  digB:'#388bfd',
  adc:'#170d33',  adcB:'#a371f7',
  ana:'#0b2010',  anaB:'#3fb950',
  clk:'#291700',  clkB:'#ffa657',
  sen:'#29200a',  senB:'#e3b341',
  pas:'#141c25',  pasB:'#505860',
  txt:'#e6edf3',  dim:'#8b949e',  pin:'#c9d1d9',
  net:'#ffd700',
  wp :'#ff7b72',  wg :'#8b949e',
  wa :'#ffa657',  ws :'#56d364',
  wc :'#e8b86d',  jnc:'#58a6ff',
};

// ─── Helpers ──────────────────────────────────────────────────────────────────
function rr(x,y,w,h,r=4) {
  g.beginPath();
  g.moveTo(x+r,y); g.lineTo(x+w-r,y); g.arcTo(x+w,y,x+w,y+r,r);
  g.lineTo(x+w,y+h-r); g.arcTo(x+w,y+h,x+w-r,y+h,r);
  g.lineTo(x+r,y+h); g.arcTo(x,y+h,x,y+h-r,r);
  g.lineTo(x,y+r); g.arcTo(x,y,x+r,y,r);
  g.closePath();
}

function ln(x1,y1,x2,y2,col=C.jnc,lw=1.5) {
  g.beginPath(); g.moveTo(x1,y1); g.lineTo(x2,y2);
  g.strokeStyle=col; g.lineWidth=lw; g.stroke();
}

function dot(x,y,r=3,col=C.jnc) {
  g.beginPath(); g.arc(x,y,r,0,2*Math.PI);
  g.fillStyle=col; g.fill();
}

// Net label flag (arrow tag)
function nf(x,y,label,dir='r',col=C.net) {
  const cw=label.length*6+10, ch=14;
  g.fillStyle='#1c1800'; g.strokeStyle=col; g.lineWidth=1;
  g.beginPath();
  if(dir==='r'){
    g.moveTo(x,y-ch/2); g.lineTo(x+cw,y-ch/2);
    g.lineTo(x+cw+7,y); g.lineTo(x+cw,y+ch/2); g.lineTo(x,y+ch/2);
  } else {
    g.moveTo(x,y-ch/2); g.lineTo(x-cw,y-ch/2);
    g.lineTo(x-cw-7,y); g.lineTo(x-cw,y+ch/2); g.lineTo(x,y+ch/2);
  }
  g.closePath(); g.fill(); g.stroke();
  g.fillStyle=col; g.font='bold 8px monospace';
  g.textAlign='center';
  g.fillText(label, x+(dir==='r'?cw/2:-cw/2), y+3);
}

// Power VCC arrow (upward from x,y)
function vcc(x,y,label) {
  const c=C.wp;
  ln(x,y,x,y-20,c); ln(x-7,y-13,x,y-21,c); ln(x+7,y-13,x,y-21,c);
  g.fillStyle=c; g.font='bold 8px monospace'; g.textAlign='center';
  g.fillText(label,x,y-24);
}

// GND symbol (downward from x,y)
function gnd(x,y,label='AGND') {
  const c=C.wg;
  ln(x,y,x,y+14,c);
  ln(x-8,y+14,x+8,y+14,c);
  ln(x-5,y+18,x+5,y+18,c);
  ln(x-2,y+22,x+2,y+22,c);
  g.fillStyle=c; g.font='bold 8px monospace'; g.textAlign='center';
  g.fillText(label,x,y+32);
}

// Draw a component box: returns {x,y,w,h}
function box(x,y,w,h,des,val,bg,bd) {
  g.fillStyle=bg; g.strokeStyle=bd; g.lineWidth=1.5;
  rr(x,y,w,h); g.fill(); g.stroke();
  // header tint
  g.fillStyle=bd+'28'; rr(x,y,w,20); g.fill();
  g.fillStyle=C.txt; g.font='bold 10px monospace'; g.textAlign='center';
  g.fillText(des,x+w/2,y+14);
  if(val) {
    const lines=val.split('\n');
    lines.forEach((l,i)=>{
      g.fillStyle=C.dim; g.font='9px monospace';
      g.textAlign='center'; g.fillText(l,x+w/2,y+28+i*13);
    });
  }
  return {x,y,w,h};
}

// Right-side pin: dot + stub + net label
function rpin(bx,by,bw,dy,name,net,col=C.pin) {
  const px=bx+bw, py=by+dy;
  ln(px,py,px+10,py,col,1);
  dot(px,py,1.5,col);
  g.fillStyle=col; g.font='8px monospace'; g.textAlign='end';
  g.fillText(name,px-3,py+3);
  if(net) nf(px+12,py,net,'r',col);
}

// Left-side pin: dot + stub, net goes left (only if bx>120)
function lpin(bx,by,dy,name,net,col=C.pin) {
  const px=bx, py=by+dy;
  ln(px-10,py,px,py,col,1);
  dot(px,py,1.5,col);
  g.fillStyle=col; g.font='8px monospace'; g.textAlign='start';
  g.fillText(name,px+3,py+3);
  if(net) nf(px-12,py,net,'l',col);
}

// Section background panel
function section(x,y,w,h,col,label) {
  g.fillStyle=col+'14'; g.strokeStyle=col+'40'; g.lineWidth=1;
  rr(x,y,w,h,6); g.fill(); g.stroke();
  g.fillStyle=col; g.font='bold 10px monospace'; g.textAlign='left';
  g.fillText(label,x+7,y+14);
}

// ─── Background ───────────────────────────────────────────────────────────────

g.strokeStyle=C.grid; g.lineWidth=0.5;

section(8,  450, 623, 340, C.anaB, '🎛 REFERENCE & EXCITATION  ·  REF5025 · OPA2333');

// ─── ADC Bypass Caps + R1 Pull-up ────────────────────────────────────────────

box(bx,80, 120,40,'C4  1µF',  'AVDD – AGND',C.pas,C.pasB);

box(U2.x,U2.y,U2.w,U2.h,'U2','SiTime SiT8924BA-22-33E\n8.192 MHz MEMS Oscillator',C.clk,C.clkB);

});

rpin(U2.x,U2.y,U2.w,90,'OUT','OSC_8M192',C.wc);

g.fillStyle=C.clk+'60'; g.strokeStyle=C.clkB+'50'; g.lineWidth=1;
rr(1288,188,505,120,4); g.fill(); g.stroke();
g.fillStyle=C.clkB; g.font='bold 9px monospace'; g.textAlign='left';
g.fillText('CLOCK PATH — populate ONE path only:',1296,204);
g.fillStyle=C.pin; g.font='9px monospace';
['  ● External OSC (default):  R2 pop, R3 DNP, U2 populated',
 '    U2.OUT → R2 (33Ω) → ADC_CLKIN → U1.XTAL1/CLKIN',

box(197,808,110,40,'C13  1µF',  'VEXC – AGND',C.pas,C.pasB);

nf(197,828,'VEXC_2V5','l',C.anaB); gnd(252,848,'AGND');
nf(197,878,'VEXC_2V5','l',C.anaB); gnd(252,898,'AGND');

// ─── Analog Input Filters CH0–CH5 ────────────────────────────────────────────
const CHANS=[
  {ch:0,sig:'FT_G0',rp:'R10',rn:'R11',c:'C20'},
  {ch:1,sig:'FT_G1',rp:'R12',rn:'R13',c:'C21'},
  {ch:2,sig:'FT_G2',rp:'R14',rn:'R15',c:'C22'},

];

CHANS.forEach((ch,i)=>{
  const fx=325+i*155, fy=790, fw=140, fh=330;
  // channel bg
  g.fillStyle=(i%2===0)?'#0d1422':'#0b1320';

  // CH label
  g.fillStyle='#79c0ff'; g.font='bold 10px monospace'; g.textAlign='center';
  g.fillText('CH'+ch.ch, fx+fw/2, fy+15);

  // Input signal net label
  nf(fx+fw/2-30, fy+32, ch.sig, 'r', C.wa);

  // Rp: signal series resistor
  g.fillStyle=C.pas; g.strokeStyle=C.pasB; g.lineWidth=1.2;
  rr(fx+8,fy+48,fw-16,36,3); g.fill(); g.stroke();
  g.fillStyle=C.txt; g.font='bold 9px monospace'; g.textAlign='center';
  g.fillText(ch.rp+'  1kΩ', fx+fw/2, fy+61);
  g.fillStyle=C.dim; g.font='8px monospace';
  g.fillText(ch.sig+'→AIN'+ch.ch+'P', fx+fw/2, fy+74);

  // Rn: VMID series resistor
  g.fillStyle=C.pas; g.strokeStyle=C.pasB; g.lineWidth=1.2;
  rr(fx+8,fy+100,fw-16,36,3); g.fill(); g.stroke();
  g.fillStyle=C.txt; g.font='bold 9px monospace'; g.textAlign='center';
  g.fillText(ch.rn+'  1kΩ', fx+fw/2, fy+113);
  g.fillStyle=C.dim; g.font='8px monospace';
  g.fillText('VMID→AIN'+ch.ch+'N', fx+fw/2, fy+126);
  // VMID net label on left
  nf(fx+8,fy+118,'VMID_AINN_BUF','l',C.wa);

  // C diff: 10nF differential cap
  g.fillStyle=C.pas; g.strokeStyle=C.pasB; g.lineWidth=1.2;
  rr(fx+8,fy+152,fw-16,36,3); g.fill(); g.stroke();
  g.fillStyle=C.txt; g.font='bold 9px monospace'; g.textAlign='center';
  g.fillText(ch.c+'  10nF', fx+fw/2, fy+165);
  g.fillStyle=C.dim; g.font='8px monospace';
  g.fillText('AIN'+ch.ch+'P – AIN'+ch.ch+'N', fx+fw/2, fy+178);

  // Wire stubs
  ln(fx+fw/2, fy+84, fx+fw/2, fy+100, C.wa);
  ln(fx+fw/2, fy+136,fx+fw/2, fy+152, C.wa);

  // Output net labels to ADC
  g.fillStyle=C.wa; g.font='bold 8px monospace'; g.textAlign='center';
  g.fillText('AIN'+ch.ch+'P_FILT', fx+fw/2, fy+208);
  g.fillText('AIN'+ch.ch+'N_FILT', fx+fw/2, fy+220);

  // Arrow upward (dotted) indicating connection to U1
  g.strokeStyle=C.wa+'50'; g.lineWidth=1; g.setLineDash([4,4]);
  ln(fx+fw/2, fy, fx+fw/2, fy-15, C.wa+'50');
  g.setLineDash([]);

  // ADC connection note
  g.fillStyle=C.adcB; g.font='8px monospace'; g.textAlign='center';
  g.fillText('→ U1.AIN'+ch.ch+'P/N', fx+fw/2, fy+240);

  // TI RC filter note
  g.fillStyle=C.dim; g.font='7px monospace';
  g.fillText('TI recommended RC', fx+fw/2, fy+258);
  g.fillText('1k+1k+10nF diff', fx+fw/2, fy+268);
});

const ux=1258, uy=808;

// ─── SPI Bus Summary ─────────────────────────────────────────────────────────
g.fillStyle='#081510'; g.strokeStyle=C.ws+'50'; g.lineWidth=1;
rr(8,1135,875,100,4); g.fill(); g.stroke();

[
  'CS          J1.GPIO_x  ──→  U1.CS           (active-low, select ADC)',
  'SCLK        J1.GPIO_y  ──→  U1.SCLK         (serial clock, max MCLK/3)',

].forEach((s,i)=>{

// ─── Net Cross-Reference (key nets) ──────────────────────────────────────────
g.fillStyle='#0a1018'; g.strokeStyle='#304060'; g.lineWidth=1;
rr(895,1135,895,100,4); g.fill(); g.stroke();
g.fillStyle='#79c0ff'; g.font='bold 10px monospace'; g.textAlign='left';

const nets=[
  ['3V3_IN',         'J1.3V3 → FB1 → [C3,C5,R1,U1.DVDD,U2.VDD,R2/R3 src,R1 top]'],
  ['3V3A',           'FB1 out → [C1,C2,U1.AVDD,U3.VIN,U4.V+,C4 top] (analog VDD)'],

];
nets.forEach((n,i)=>{

  g.fillText(n[1], 1040, 1165+i*12);
});
